<!DOCTYPE html>
<html>
<head>
    <title>Historial de Ventas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">🚗 Inventario AutoPartes</div>
    <div class="menu">
        <a href="/">🏠 Inicio</a>
        <a href="/agregar">📦 Añadir Stock</a>
        <a href="/inventario">📋 Ver Inventario</a>
        <a href="/vender">💰 Vender</a>
        <a href="/historial">📝 Historial</a>
        <a href="/dashboard">📊 Dashboard</a>
    </div>
</nav>

<h1>📝 Historial de Ventas</h1>

<!-- Botón para descargar Excel -->
<button onclick="descargarExcel()" style="padding:10px;margin-bottom:15px;">
    📥 Descargar Excel
</button>

<!-- Buscador de historial -->
<input 
    type="text" 
    id="buscarVenta" 
    placeholder="🔎 Buscar producto..." 
    style="padding:10px;margin-bottom:20px;width:300px"
>

<!-- Tabla de historial -->
<table class="tabla">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
            <th>Total</th>
            <th>Fecha</th>
            <th>Vendedor</th> <!-- Nuevo campo -->
        </tr>
    </thead>
    <tbody id="tablaHistorial"></tbody>
</table>

<script>
async function cargarHistorial(){
    const res = await fetch("/api/historial");
    const data = await res.json();
    const tabla = document.getElementById("tablaHistorial");
    tabla.innerHTML = "";

    data.forEach(v => {
        tabla.innerHTML += `
<tr>
    <td>${v.producto}</td>
    <td>${v.cantidad}</td>
    <td>$${Number(v.precio_unitario).toLocaleString()}</td>
    <td>$${Number(v.total).toLocaleString()}</td>
    <td>${v.fecha}</td>
    <td>${v.vendedor}</td> <!-- Mostrar vendedor -->
</tr>
        `;
    });
}

// Buscador de historial
document.getElementById("buscarVenta").addEventListener("keyup", function(){
    let texto = this.value.toLowerCase();
    document.querySelectorAll("#tablaHistorial tr").forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(texto) ? "" : "none";
    });
});

// Función para descargar Excel
function descargarExcel(){
    window.location.href = "/exportar_excel";
}

// Cargar historial al iniciar
cargarHistorial();
</script>

</body>
</html>
