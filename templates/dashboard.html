<!DOCTYPE html>
<html>
<head>
<title>Dashboard Ventas</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<nav class="navbar">
<div class="logo">🚗 Inventario AutoPartes</div>
<div class="menu">
<a href="/">🏠 Inicio</a>
<a href="/agregar">📦 Añadir Stock</a>
<a href="/inventario">📋 Ver Inventario</a>
<a href="/vender">💰 Vender</a>
<a href="/historial">📝 Historial</a>
</div>
</nav>

<h1>📊 Dashboard de Ventas</h1>

<div class="cards">

<div class="card">
<h3>Ventas Totales</h3>
<p id="ventasTotales">0</p>
</div>

<div class="card">
<h3>Unidades Vendidas</h3>
<p id="unidadesTotales">0</p>
</div>

</div>

<table id="tabla-dashboard">
<thead>
<tr>
<th>Semana</th>
<th>Unidades</th>
<th>Ganancias</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

async function cargarDashboard(){

const res = await fetch("/api/dashboard")
const data = await res.json()

console.log("DATA:", data)

const tbody = document.querySelector("#tabla-dashboard tbody")
tbody.innerHTML=""

// 🔥 USAR LOS ARRAYS CORRECTOS
for(let i=0; i<data.semanas.length; i++){

    tbody.innerHTML += `
    <tr>
    <td>${data.semanas[i]}</td>
    <td>${data.unidades[i]}</td>
    <td>$${data.ganancias[i].toLocaleString()}</td>
    </tr>
    `
}

// 🔥 TOTALES DIRECTOS
document.getElementById("ventasTotales").innerText = "$" + data.total_ventas.toLocaleString()
document.getElementById("unidadesTotales").innerText = data.total_unidades

}

cargarDashboard()

</script>

</body>
</html>
