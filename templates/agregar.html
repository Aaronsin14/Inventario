<!DOCTYPE html>
<html>

<head>
<title>Añadir Stock</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">🚗 Inventario AutoPartes</div>
    <div class="menu">
        <a href="/">🏠 Inicio</a>
        <a href="/agregar">📦 Añadir Stock</a>
        <a href="/inventario">📋 Ver Inventario</a>
        <a href="/vender">💰 Vender</a>
        <a href="/historial">📝 Historial</a>
        <a href="/dashboard">📊 Dashboard</a>
    </div>
  </nav>

<h1>Añadir Producto</h1>

<form id="form">

<input type="text" name="codigo" placeholder="Código del producto" required>

<input type="text" name="nombre" placeholder="Nombre del producto" required>

<input type="text" name="descripcion" placeholder="Descripción">

<input type="text" name="marca" placeholder="Marca">

<input type="number" name="cantidad" placeholder="Cantidad" required>

<input type="number" step="0.01" name="precio" placeholder="Precio" required>

<input type="number" step="0.01" name="precio_minimo" placeholder="Precio mínimo" required>

<input type="file" name="foto">

<button>Agregar Producto</button>

</form>

<img src="{{ producto.foto }}" width="100">

</body>
</html>
